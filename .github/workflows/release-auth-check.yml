name: Release Auth Check

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  crates-io:
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable

      - name: Check crates.io token is configured
        shell: bash
        run: |
          set -euo pipefail
          test -n "$CARGO_REGISTRY_TOKEN"

      - name: Dry-run crates.io package
        run: cargo publish --dry-run --locked

  npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Dry-run npm manifest
        run: npm pack --dry-run ./npm/fmtview
