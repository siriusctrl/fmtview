name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-linux-x64:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - name: Validate tag and package versions
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          npm_version="$(node -p "require('./npm/fmtview/package.json').version")"
          tag="${GITHUB_REF_NAME#v}"

          test "$version" = "$tag"
          test "$npm_version" = "$version"

          echo "version=$version" >> "$GITHUB_OUTPUT"

      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test
      - run: cargo build --release --locked

      - name: Package Linux x64 binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/fmtview-linux-x64
          cp target/release/fmtview dist/fmtview-linux-x64/
          cp target/release/fmtview dist/fmtview
          cp README.md LICENSE dist/fmtview-linux-x64/
          tar -C dist -czf "dist/fmtview-linux-x64.tar.gz" fmtview-linux-x64

      - uses: actions/upload-artifact@v4
        with:
          name: fmtview-linux-x64
          path: |
            dist/fmtview-linux-x64.tar.gz
            dist/fmtview

  github-release:
    runs-on: ubuntu-latest
    needs: build-linux-x64
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: fmtview-linux-x64
          path: dist

      - name: Create checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum fmtview-linux-x64.tar.gz > sha256sums.txt

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/fmtview-linux-x64.tar.gz dist/sha256sums.txt --clobber
          else
            gh release create "$TAG" dist/fmtview-linux-x64.tar.gz dist/sha256sums.txt \
              --title "$TAG" \
              --notes "fmtview $TAG"
          fi

  crates-io:
    runs-on: ubuntu-latest
    needs: build-linux-x64
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable

      - name: Dry-run crates.io package
        run: cargo publish --dry-run --locked

      - name: Publish to crates.io
        if: env.CARGO_REGISTRY_TOKEN != ''
        run: cargo publish --locked --token "$CARGO_REGISTRY_TOKEN"

      - name: Skip crates.io publish
        if: env.CARGO_REGISTRY_TOKEN == ''
        run: echo "CARGO_REGISTRY_TOKEN is not configured; skipped crates.io publish."

  npm:
    runs-on: ubuntu-latest
    needs: build-linux-x64
    permissions:
      contents: read
      id-token: write
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v4
        with:
          name: fmtview-linux-x64
          path: dist

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Prepare npm package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p npm/fmtview/vendor
          cp dist/fmtview npm/fmtview/vendor/fmtview
          cp LICENSE npm/fmtview/LICENSE
          chmod 755 npm/fmtview/vendor/fmtview
          node npm/fmtview/bin/fmtview.js --version
          npm pack --dry-run ./npm/fmtview

      - name: Publish to npm
        if: env.NODE_AUTH_TOKEN != ''
        working-directory: npm/fmtview
        run: npm publish --provenance

      - name: Skip npm publish
        if: env.NODE_AUTH_TOKEN == ''
        run: echo "NPM_TOKEN is not configured; skipped npm publish."
